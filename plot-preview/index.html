<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Preview</title>
    <meta name="description" content="Preview generated plots from EoSAlign.">
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://eosapplications.com/plot-preview/">

    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/Fonts.css">
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="/css/Header.css">
    <link rel="stylesheet" href="/css/Banner.css">
    <link rel="stylesheet" href="/css/Footer.css">
    <link rel="stylesheet" href="/css/Dropdown.css">
    <link rel="stylesheet" href="/css/Plot_Preview.css">
    <link rel="icon" href="/images/EoSApplications_With_Sun.PNG" type="image/png">
</head>
<body>

    <!-- Header is fetched from Partials/Header.html and mounted here -->
    <div id="site-header-mount"></div>

    <!-- Banner is fetched from Partials/Banner.html and mounted here -->
    <div id="app-banner-mount"
         data-sun-image="/images/EoSAlign_With_Sun.PNG"
         data-app-name="EoSAlign"
         data-home-href="/eosalign/"></div>

    <main id="main-content">
        <div id="plot-preview-app">

            <div id="plot-preview-loading" class="plot-preview-status">
                <p id="plot-preview-loading-message">Loading Python runtime…</p>
            </div>

            <div id="plot-preview-figures" hidden></div>

        </div>
    </main>

    <!-- Footer is fetched from Partials/Footer.html and mounted here -->
    <div id="site-footer-mount"></div>

    <script src="/js/Header.js"></script>
    <script src="/js/Banner.js"></script>
    <script src="/js/Footer.js"></script>
    <script src="/js/Dropdown_Widget.js"></script>
    <script src="/js/Pyodide_Bootstrap.js"></script>
    <script src="/js/Plot_Preview.js"></script>
</body>
</html>
